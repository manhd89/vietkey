name: Android Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"

      - name: Clone fcitx5-unikey engine
        run: |
          git clone --depth=1 \
            https://github.com/fcitx/fcitx5-unikey.git \
            app/src/main/cpp/fcitx5-unikey

      - name: List unikey source files
        run: |
          echo "=== unikey/ directory ==="
          ls -la app/src/main/cpp/fcitx5-unikey/unikey/ || echo "unikey/ NOT FOUND"
          echo "=== .cpp files ==="
          find app/src/main/cpp/fcitx5-unikey/unikey -name "*.cpp" | sort

      - uses: gradle/actions/setup-gradle@v4

      - name: Grant permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VietKey-debug
          path: app/build/outputs/apk/debug/*.apk
